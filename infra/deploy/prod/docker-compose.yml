services:
  gateway:
    build:
      context: ../../..
      dockerfile: infra/deploy/prod/Caddy.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: kabi-chat-gateway
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - caddy-data:/data
      - caddy-config:/config

  app:
    build:
      context: ../../..
      dockerfile: backend/Dockerfile.prod
    container_name: kabi-chat-app-prod
    env_file:
      - ${DEPLOY_ENV_FILE:-.env}
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: kabi-chat-db-prod
    env_file:
      - ${DEPLOY_ENV_FILE:-.env}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  caddy-config:
  caddy-data:
  postgres-data:
