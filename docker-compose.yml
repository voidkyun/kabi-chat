services:
  db:
    image: postgres:16-alpine
    container_name: kabi-chat-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kabi_chat}
      POSTGRES_USER: ${POSTGRES_USER:-kabi_chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kabi_chat}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kabi_chat} -d ${POSTGRES_DB:-kabi_chat}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
